<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face-ID System - Premium AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>
    <div id="app" v-cloak>
        <div class="container">
            <header>
                <h1>Face-ID <span>Pro</span></h1>
                <p>Hệ thống nhận diện khuôn mặt thông minh</p>
            </header>

            <main>
                <div class="card glass">
                    <div class="video-container">
                        <video ref="video" autoplay playsinline></video>
                        <canvas ref="canvas" style="display:none;"></canvas>
                        <div class="scanner-line" v-if="scanning"></div>
                    </div>

                    <div class="controls">
                        <div class="input-group">
                            <input type="text" v-model="username" placeholder="Nhập tên người dùng..."
                                id="username-input">
                        </div>

                        <div class="button-group">
                            <button @click="handleAction('register')" :disabled="loading" class="btn btn-primary">
                                <span v-if="loading && action === 'register'" class="loader"></span>
                                Thiết lập Face-ID
                            </button>
                            <button @click="handleAction('verify')" :disabled="loading" class="btn btn-secondary">
                                <span v-if="loading && action === 'verify'" class="loader"></span>
                                Xác thực Login
                            </button>
                        </div>
                    </div>
                </div>

                <div v-if="message" :class="['alert', status]">
                    {{ message }}
                </div>
            </main>

            <!-- Toast System -->
            <div class="toast-container">
                <div v-for="toast in toasts" :key="toast.id" :class="['toast', toast.type]">
                    <div class="toast-icon" v-if="toast.type === 'success'">✓</div>
                    <div class="toast-icon" v-else>!</div>
                    <div class="toast-content">{{ toast.message }}</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>

    <script type="module">
        import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        // Hàm lấy ảnh từ webcam và chuyển thành Blob
        async function getScreenshotFromWebcam() {
            const video = document.querySelector('video');
            if (!video) return null;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            return new Promise((resolve) => {
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg');
            });
        }

        // Hàm gửi vector về server Mắt Bão
        async function sendToMatBao(vector) {
            const usernameInput = document.getElementById('username-input');
            const username = usernameInput ? usernameInput.value : null;

            if (!username) {
                alert("Vui lòng nhập tên người dùng trước!");
                return;
            }

            try {
                const response = await fetch("https://eemc.com.vn/calendar/backend/api_face.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        user_id: username,
                        face_token: JSON.stringify(vector)
                    })
                });
                const result = await response.json();
                console.log("Kết quả từ Mắt Bão:", result);
                alert(result.message);
            } catch (error) {
                console.error("Lỗi gửi tới Mắt Bão:", error);
                alert("Lỗi kết nối tới server Mắt Bão.");
            }
        }

        async function scanFace() {
            console.log("Bắt đầu quét khuôn mặt thông qua Hugging Face...");
            try {
                const imageBlob = await getScreenshotFromWebcam();
                if (!imageBlob) {
                    alert("Không tìm thấy luồng video từ webcam.");
                    return;
                }

                const app = await client("Lavie2404/deepface");

                const result = await app.predict("/predict", [
                    imageBlob,
                ]);

                // Gradio thường trả về mảng, giả sử data[0] là chuỗi JSON của vector
                const vector = typeof result.data[0] === 'string' ? JSON.parse(result.data[0]) : result.data[0];
                console.log("Vector nhận về từ HF:", vector);

                await sendToMatBao(vector);
            } catch (error) {
                console.error("Lỗi trong quá trình Scan:", error);
                alert("Lỗi khi xử lý ảnh qua Hugging Face: " + error.message);
            }
        }

        // Gán vào window để có thể gọi từ giao diện Vue nếu cần
        window.scanFaceFromHF = scanFace;
    </script>
</body>

</html>
